tasks:
  - task: install_apt_packages
    arguments:
      - Aptfile

  - task: install_uv
    enabled: false

  # Depends on install_uv
  - task: install_using_uv_with_executables_from
    arguments:
      - "ansible"
      - "ansible-core,ansible-lint"
      - "localhost -m ping"
    enabled: false

  - task: install_goose
    enabled: false

  - task: install_dotnet
    arguments:
      - 10
    enabled: true

  - task: configure_shell
    arguments:
      - zsh
      - pwsh

  - task: install_font
    arguments:
      - JetBrainsMono
      - v3.3.0

  - task: install_terminal_tools
    arguments:
      - zsh

  - task: configure_podman
    enabled: false

  - task: install_rust
    enabled: false

  - task: install_java
    arguments:
      - 21
    enabled: false

  - task: install_mise

  # Depends on Mise
  - task: install_mise_tools

  # Depends on Mise (Go)
  - task: install_storage_tools
    enabled: true

  # Depends on Ruby, installed by Mise
  - task: install_jekyll

  # Depends on Ruby, installed by Mise
  - task: install_rails
    enabled: true

  - task: install_homebrew
    enabled: true

  - task: brew_bundle
    arguments:
      - Brewfile

  - task: configure_flatpak

  - task: display_environment

  - task: display_versions

  - task: show_message
    arguments:
      - Remember to restart your shell environment before proceeding.
