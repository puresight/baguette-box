tasks:

- task: show_message
  arguments:
    - This YAML flow sets up VS Code for you.

- task: install_code
  arguments:
    - code/argv.json

- task: install_code_extensions
  arguments:
    - code/code.dep

- task: configure_code
  arguments:
    - code/user-settings.json
  enabled: true

- task: show_message
  arguments:
    - VS Code should be ready to use.
